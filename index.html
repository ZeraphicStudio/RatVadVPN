<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RatVad VPN</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>

/* ТЕМЫ */
:root {
  --bg: radial-gradient(circle at top, #0f172a, #020617);
  --text: #e5e7eb;
  --card: rgba(255,255,255,0.05);
  --card-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.07);
  --header: rgba(15,23,42,0.6);
  --title: #cbd5f5;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: linear-gradient(180deg, #f8fafc, #e2e8f0);
    --text: #0f172a;
    --card: rgba(255,255,255,0.9);
    --card-hover: rgba(255,255,255,1);
    --border: rgba(0,0,0,0.08);
    --header: rgba(255,255,255,0.8);
    --title: #1e293b;
  }
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 1000;
  padding: 18px;
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  background: var(--header);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}

/* CONTAINER */
.container {
  padding: 20px;
  padding-bottom: 80px;
}

.section {
  margin-top: 35px;
}

/* TITLE */
.title {
  font-size: 22px;
  margin-bottom: 14px;
  font-weight: 700;
  color: var(--title);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

@media (max-width: 500px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 20px;
  padding: 18px;
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  transition: 0.3s;
  animation: fadeUp 0.5s ease;
  font-size: 15px;
  line-height: 1.6;
}

.card:hover {
  transform: translateY(-5px);
  background: var(--card-hover);
}

/* SERVER */
.country {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.country-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.country-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.flag {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.ping {
  font-size: 12px;
  color: #4ade80;
  background: rgba(74,222,128,0.1);
  padding: 4px 8px;
  border-radius: 10px;
}

.server-desc {
  font-size: 12px;
  color: #9ca3af;
}

/* ICON */
.icon {
  font-size: 22px;
  color: #60a5fa;
  margin-bottom: 10px;
}

/* BUTTON */
.button {
  display: block;
  text-align: center;
  padding: 15px;
  margin-top: 15px;
  background: linear-gradient(90deg, #2563eb, #3b82f6);
  color: white;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
  cursor: pointer;
}

.button:hover {
  transform: scale(1.05);
}

/* MENU */
.bottom-menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: var(--header);
  backdrop-filter: blur(14px);
  display: flex;
  justify-content: space-around;
  border-top: 1px solid var(--border);
  padding: 10px 0;
}

.menu-item {
  text-align: center;
  font-size: 12px;
  color: #6b7280;
}

.menu-item i {
  font-size: 18px;
  display: block;
  margin-bottom: 3px;
}

.menu-item.active {
  color: #3b82f6;
  font-weight: bold;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px)}
  to {opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<header>RatVad VPN</header>

<div class="container" id="content"></div>

<div class="bottom-menu">
  <div class="menu-item active" onclick="home()"><i class="fa-solid fa-shield"></i>О нас</div>
  <div class="menu-item" onclick="connect()"><i class="fa-solid fa-plug"></i>Подключить</div>
  <div class="menu-item" onclick="guide()"><i class="fa-solid fa-book"></i>Инструкция</div>
</div>

<script>

function fakePing(){
  return Math.floor(Math.random() * 20) + 10;
}

function server(code,name){
return `
<div class="card country">
  <div class="country-top">
    <div class="country-left">
      <img class="flag" src="https://snipp.ru/cdn/country-flags/png48px/${code}.png">
      <b>${name}</b>
    </div>
    <div class="ping">${fakePing()} ms</div>
  </div>
  <div class="server-desc">Стабильный пинг</div>
</div>
`;
}

function home(){
setActive(0);
document.getElementById('content').innerHTML = `

<div class="card">
<b>RatVad VPN</b><br><br>
Современный VPN для полной анонимности и защиты в сети.<br><br>
Стабильная скорость, отсутствие логов и мгновенное подключение.<br>
Подходит для обхода блокировок, игр и безопасного серфинга.

<a class="button" onclick="connect()">Подключиться</a>
</div>

<div class="section">
<div class="title">Серверы</div>
<div class="grid">
${server("us","США")}
${server("se","Швеция")}
${server("ru","Россия")}
${server("nl","Нидерланды")}
</div>
</div>

<div class="section">
<div class="title">Тарифы</div>
<div class="grid">
<div class="card"><b>14 дней</b><br><br>Идеально для теста<br><br><b>80 ₽</b></div>
<div class="card"><b>30 дней</b><br><br>Лучший выбор<br><br><b>150 ₽</b></div>
<div class="card"><b>60 дней</b><br><br>Максимальная выгода<br><br><b>270 ₽</b></div>
</div>
</div>

<!-- НОВЫЙ БЛОК -->
<div class="section">
<div class="title">Наш канал</div>

<div class="card">
<b>Telegram канал RatVad</b><br><br>
Новости, обновления и важная информация.<br>
А также розыгрыши и бонусы для пользователей 🔥

<a class="button" href="https://t.me/RatVad" target="_blank">Перейти в канал</a>
</div>

</div>

`;
}

function connect(){
setActive(1);
document.getElementById('content').innerHTML = `
<div class="card">
<h2>Подключение</h2>

<p>Подключение занимает меньше минуты.</p>
<p>Всё делается через Telegram.</p>

<a class="button" href="https://t.me/RatVadBot" target="_blank">Открыть бота</a>
<a class="button" href="https://t.me/RatVad" target="_blank">Канал</a>

</div>
`;
}

function guide(){
setActive(2);
document.getElementById('content').innerHTML = `
<div class="card">
<h2>Инструкция</h2>
<p>1. Открой бота</p>
<p>2. Оплати</p>
<p>3. Подключись</p>
</div>
`;
}

function setActive(i){
let items=document.querySelectorAll('.menu-item');
items.forEach((el,index)=>{
  el.classList.toggle('active', index===i);
});
}

home();

</script>

</body>
</html>
